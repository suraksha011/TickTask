<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TickTask — Sign Up</title>
    <link rel="stylesheet" th:href="@{/css/green-theme.css}">
</head>
<body class="auth-body">

<div class="auth-card">
    <div class="auth-logo">T</div>
    <h1>Create your account</h1>
    <p class="auth-tagline">Start organizing with TickTask</p>

    <p th:if="${error}" class="msg error" th:text="${error}"></p>

    <form th:action="@{/register}" th:object="${newUser}" method="post" class="auth-form">
        <input type="text" th:field="*{username}" placeholder="Username" required>
        <input type="text" th:field="*{displayName}" placeholder="Display name (optional)">
        <input type="password" th:field="*{password}" placeholder="Password (min 4 chars)" required>
        <button type="submit" class="btn-auth-submit">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a th:href="@{/login}">Log in</a></p>
</div>

</body>
</html>
