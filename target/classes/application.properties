# Server
server.port=8080

# Session timeout - logs user out after 30 min of inactivity (unless "remember me" was checked)
server.servlet.session.timeout=30m

# H2 file-based database (data persists in ./data/taskdb.mv.db)
spring.datasource.url=jdbc:h2:file:./data/taskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auto create/update tables from entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 web console (optional - visit http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
